services:
  hermes-agent:
    image: 'nousresearch/hermes-agent:latest'
    restart: unless-stopped
    command: [ gateway, run ]
    env_file:
      - .env
    environment:
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY:-}'
      OPENAI_API_KEY: '${OPENAI_API_KEY:-}'
      OPENROUTER_API_KEY: '${OPENROUTER_API_KEY:-}'
      GOOGLE_API_KEY: '${GOOGLE_API_KEY:-}'
      GROQ_API_KEY: '${GROQ_API_KEY:-}'
      MISTRAL_API_KEY: '${MISTRAL_API_KEY:-}'
      HERMES_UID: '10010'

      HERMES_DASHBOARD: '1'
      HERMES_DASHBOARD_HOST: '127.0.0.1'
      HERMES_DASHBOARD_PORT: '9119'

      API_SERVER_ENABLED: 'true'
      API_SERVER_HOST: '0.0.0.0'
      API_SERVER_KEY: '${API_SERVER_KEY}'
      GATEWAY_ALLOW_ALL_USERS: 'true'

    volumes:
      - 'hermes-agent-data:/opt/data'

    ports:
      - '127.0.0.1:8642:8642'
      - '127.0.0.1:9119:9119'

  hermes-dashboard-proxy:
    image: 'caddy:2'
    restart: unless-stopped
    depends_on:
      - hermes-agent
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - './caddy:/etc/caddy:ro'
    ports:
      - '127.0.0.1:9191:9191'

  hermes-workspace:
    image: 'ghcr.io/outsourc-e/hermes-workspace:latest'
    restart: unless-stopped
    depends_on:
      - hermes-agent
      - hermes-dashboard-proxy
    env_file:
      - .env
    environment:
      HERMES_HOME: '/home/workspace/.hermes'
      HERMES_WORKSPACE_DIR: '/workspace'
      HERMES_API_URL: 'http://hermes-agent:8642'
      HERMES_DASHBOARD_URL: 'http://host.docker.internal:9191'
      HERMES_API_TOKEN: '${API_SERVER_KEY}'
      HERMES_PASSWORD: '${HERMES_PASSWORD:-${CLAUDE_PASSWORD:-}}'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - 'hermes-agent-data:/home/workspace/.hermes'
      - 'hermes-workspace-files:/workspace'
    ports:
      - '127.0.0.1:3000:3000'

volumes:
  hermes-agent-data: null
  hermes-workspace-files: null
